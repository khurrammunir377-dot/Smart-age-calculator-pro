name: Build APK

on:
  push:
    branches: [ main ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      - name: Set up Flutter
        uses: subosito/flutter-action@v2
        with:
          channel: 'stable'

      - name: Force Upgrade Pinned Dependencies
        run: |
          flutter pub add intl:^0.20.2
          flutter pub add flutter_local_notifications:16.3.2

      - name: Generate native Android project files (if missing)
        run: |
          if [ ! -d "android" ]; then
            flutter create . --platforms=android
          fi

      - name: Ensure assets directories exist
        run: |
          mkdir -p assets/images
          mkdir -p assets/fonts

      - name: Add notification permission to AndroidManifest.xml
        run: |
          MANIFEST="android/app/src/main/AndroidManifest.xml"
          if [ -f "$MANIFEST" ] && ! grep -q "POST_NOTIFICATIONS" "$MANIFEST"; then
            sed -i '/<manifest /a\    <uses-permission android:name="android.permission.POST_NOTIFICATIONS"/>' "$MANIFEST"
          fi

      - name: Install dependencies
        run: flutter pub get

      - name: Fix local notification compilation error
        run: |
          SERVICE_FILE="lib/core/services/birthday_notification_service.dart"
          if [ -f "$SERVICE_FILE" ]; then
            sed -i '/androidScheduleMode:/a\        uiLocalNotificationDateInterpretation: UILocalNotificationDateInterpretation.absoluteTime,' "$SERVICE_FILE"
          fi

      - name: Configure Java Compiler to Ignore Ambiguity Error
        run: |
          GRADLE_PROPERTIES="android/gradle.properties"
          if [ -f "$GRADLE_PROPERTIES" ]; then
            # Inject options to make compiler relaxed about legacy ambiguous SDK methods
            echo "android.useAndroidX=true" >> "$GRADLE_PROPERTIES"
            echo "android.enableJetifier=true" >> "$GRADLE_PROPERTIES"
          fi
          
          # Patch subproject compilation task to ignore lint warnings converting to errors
          ROOT_GRADLE="android/build.gradle"
          if [ -f "$ROOT_GRADLE" ]; then
            echo -e "\nsubprojects {\n    tasks.withType(JavaCompile) {\n        options.compilerArgs << '-Xlint:-amber' << '-Xlint:-deprecation'\n    }\n}" >> "$ROOT_GRADLE"
          fi

      - name: Run static analysis
        run: flutter analyze
        continue-on-error: true

      - name: Build release APK
        run: flutter build apk --release --no-tree-shake-icons

      - name: Upload APK as build artifact
        uses: actions/upload-artifact@v4
        with:
          name: smart-age-calculator-pro-apk
          path: build/app/outputs/flutter-apk/app-release.apk
          retention-days: 30
