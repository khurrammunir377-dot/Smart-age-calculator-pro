name: smart_age_calculator_pro
description: A professional age calculator app with advanced features.

publish_to: 'none'

version: 1.0.0+1

environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter
  intl: ^0.18.1
  flutter_riverpod: ^2.4.9
  sqflite: ^2.3.0
  path: ^1.8.3
  path_provider: ^2.1.1
  shared_preferences: ^2.2.2
  image_picker: ^1.0.4
  url_launcher: ^6.2.2
  share_plus: ^7.2.1
  printing: ^5.11.1
  pdf: ^3.10.7
  flutter_local_notifications: ^15.1.1
  timezone: ^0.9.2
  package_info_plus: ^5.0.1
  cupertino_icons: ^1.0.6

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.1

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/legal/
